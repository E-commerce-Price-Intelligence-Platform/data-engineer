version: 2

sources:
  - name: raw_prices
    database: "{{ var('project_id') }}"
    schema: "{{ var('raw_dataset') }}"
    description: "Raw smartphone price data loaded by bigquery_loader.py after each scrape run."

    tables:
      - name: jumia
        description: "Raw scraped records from jumia.ma (Scrapy, ~356 products/day)."
        columns:
          - name: name
            data_tests: [not_null]
          - name: price
            data_tests:
              - not_null:
                  config:
                    severity: warn
          - name: source_site
            data_tests:
              - accepted_values:
                  values: ["jumia_ma"]

      - name: electroplanet
        description: "Raw scraped records from electroplanet.ma (Selenium, ~56 products/day)."
        columns:
          - name: name
            data_tests: [not_null]
          - name: price
            data_tests: [not_null]
          - name: source_site
            data_tests:
              - accepted_values:
                  values: ["electroplanet"]

      - name: amazon
        description: "Raw scraped records from amazon.fr (Selenium, ~140 products/day). ~64% of listings have no visible price (marketplace/B2B)."
        columns:
          - name: name
            data_tests: [not_null]
          - name: price
            data_tests:
              - not_null:
                  config:
                    severity: warn
          - name: source_site
            data_tests:
              - accepted_values:
                  values: ["amazon_fr"]
