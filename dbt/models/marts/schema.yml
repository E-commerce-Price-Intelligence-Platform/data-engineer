version: 2

models:
  - name: mart_daily_prices
    description: >
      One row per (site, brand, model, day). Incremental — merges on price_day_sk
      so same-day re-runs update rather than duplicate.
    columns:
      - name: price_day_sk
        data_tests: [unique, not_null]
      - name: source_site
        data_tests: [not_null]
      - name: brand
        data_tests: [not_null]
      - name: model
        data_tests: [not_null]
      - name: scraped_date
        data_tests: [not_null]
      - name: avg_price
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "> 0"
      - name: listing_count
        data_tests:
          - dbt_utils.expression_is_true:
              expression: "> 0"

  - name: mart_price_velocity
    description: "Day-over-day price change per (site, brand, model). Needs ≥2 daily snapshots."
    columns:
      - name: price_day_sk
        data_tests: [unique, not_null]
      - name: price_trend
        data_tests:
          - accepted_values:
              values: ["increase", "decrease", "stable"]

  - name: mart_brand_stats
    description: "Aggregated statistics per brand across all sites and models."
    columns:
      - name: brand
        data_tests: [unique, not_null]
      - name: product_count
        data_tests:
          - dbt_utils.expression_is_true:
              expression: "> 0"
      - name: avg_price
        data_tests: [not_null]

  - name: mart_price_comparison
    description: "Average price per (brand, model, site) — use for cross-site comparison."
    columns:
      - name: brand
        data_tests: [not_null]
      - name: model
        data_tests: [not_null]
      - name: source_site
        data_tests: [not_null]

  - name: mart_discount_leaders
    description: "Top 100 most discounted products, ranked by computed discount_pct."
    columns:
      - name: discount_pct
        data_tests:
          - dbt_utils.expression_is_true:
              expression: "> 0"
