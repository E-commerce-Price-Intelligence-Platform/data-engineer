price_intelligence:
  target: dev
  outputs:
    dev:
      type: bigquery
      method: service-account
      project: "{{ env_var('GCP_PROJECT', 'regal-unfolding-490222-g5') }}"
      dataset: "{{ env_var('DBT_DATASET', 'dbt_price_intelligence') }}"
      keyfile: "{{ env_var('GOOGLE_APPLICATION_CREDENTIALS', '/opt/airflow/price_intelligence/gcp-credentials.json') }}"
      location: "{{ env_var('BQ_LOCATION', 'EU') }}"
      threads: 4
      timeout_seconds: 300
