services:
  airflow:
    build: .
    container_name: airflow
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=sqlite:////opt/airflow/airflow.db
      - AIRFLOW__DATABASE__SQL_ENGINE_ARGS={"connect_args":{"timeout":60}}
      - AIRFLOW__SCHEDULER__JOB_HEARTBEAT_SEC=30
      - AIRFLOW__SCHEDULER__SCHEDULER_HEARTBEAT_SEC=30
      - AIRFLOW__WEBSERVER__SECRET_KEY=price_intelligence_secret
      - _AIRFLOW_DB_MIGRATE=true
      - _AIRFLOW_WWW_USER_CREATE=true
      - _AIRFLOW_WWW_USER_USERNAME=admin
      - _AIRFLOW_WWW_USER_PASSWORD=admin123
      - SELENIUM_REMOTE_URL=http://selenium:4444
      - NIFI_URL=https://nifi:8443
      # Bigtable configuration - using GCP (no emulator)
      - GCP_PROJECT=regal-unfolding-490222-g5
      - BIGTABLE_INSTANCE_ID=price-intel-instance
      - BIGTABLE_TABLE_ID=smartphones
      - BIGTABLE_ZONE=us-central1-b
      # BigQuery configuration
      - GOOGLE_APPLICATION_CREDENTIALS=/opt/airflow/price_intelligence/gcp-credentials.json
      - BQ_LOCATION=EU
    volumes:
      - ./dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
      - airflow_plugins:/opt/airflow/plugins
      - ..:/opt/airflow/price_intelligence
    ports:
      - "8080:8080"
    command: airflow standalone
    depends_on:
      - selenium

  selenium:
    image: selenium/standalone-chrome:latest
    container_name: selenium
    shm_size: 2g
    ports:
      - "4444:4444"

  nifi:
    build:
      context: ../nifi
      dockerfile: Dockerfile
    container_name: nifi
    hostname: nifi
    ports:
      - "8443:8443"
    environment:
      - SINGLE_USER_CREDENTIALS_USERNAME=admin
      - SINGLE_USER_CREDENTIALS_PASSWORD=adminadminadmin
      - GCP_PROJECT=regal-unfolding-490222-g5
      - BIGTABLE_INSTANCE_ID=price-intel-instance
      - BIGTABLE_TABLE_ID=smartphones
      - GOOGLE_APPLICATION_CREDENTIALS=/opt/nifi/price_intelligence/gcp-credentials.json
    volumes:
      - ..:/opt/nifi/price_intelligence
      - nifi_conf:/opt/nifi/nifi-current/conf
      - nifi_logs:/opt/nifi/nifi-current/logs

volumes:
  airflow_logs:
  airflow_plugins:
  nifi_conf:
  nifi_logs:
